<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antivirus Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .section {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .section:last-of-type {
            border: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: border-color 0.2s;
            text-align: center;
        }

        .file-upload:hover {
            border-color: var(--accent);
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: var(--text);
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 1rem;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s ease;
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .results {
            margin-top: 1.5rem;
            display: none;
        }

        .result-item {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .result-item.clean {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
        }

        .badge {
            display: inline-block;
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-right: 0.5rem;
        }

        .badge.danger {
            background: var(--danger);
            color: var(--text);
        }

        .badge.success {
            background: var(--success);
            color: var(--text);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Malware Scanner</h1>

    <div class="section">
        <label>1. База сигнатур (rules.zip)</label>
        <label for="rules-file" class="file-upload" id="rules-label">Загрузить rules.zip</label>
        <input type="file" id="rules-file" accept=".zip">
    </div>

    <div class="section">
        <label>2. Объект сканирования (target.zip)</label>
        <label for="target-file" class="file-upload" id="target-label">Выбрать архив для проверки</label>
        <input type="file" id="target-file" accept=".zip" disabled>
        
        <button id="scan-btn" class="btn" disabled>Запустить сканирование</button>

        <div class="progress-container" id="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="status-text">
                <span id="status-label">Подготовка...</span>
                <span id="percent-label">0%</span>
            </div>
        </div>
    </div>

    <div class="results" id="results-wrapper"></div>
</div>

<script>
    let globalRules = null;

    const fallbackRules = `
[Stealer]
evil_domain.com
malicious_payload_url
coinhive.min.js

[Adware]
popunder_trigger_class
click_redirect_helper
`;

    const rulesFileInput = document.getElementById('rules-file');
    const rulesLabel = document.getElementById('rules-label');
    const targetFileInput = document.getElementById('target-file');
    const targetLabel = document.getElementById('target-label');
    const scanBtn = document.getElementById('scan-btn');
    const progressWrapper = document.getElementById('progress-wrapper');
    const progressBar = document.getElementById('progress-bar');
    const statusLabel = document.getElementById('status-label');
    const percentLabel = document.getElementById('percent-label');
    const resultsWrapper = document.getElementById('results-wrapper');

    function parseRules(rawText) {
        const rules = {};
        if (!rawText) return rules;
        const lines = rawText.split(/\r?\n/);
        let currentCategory = "General";

        for (let line of lines) {
            line = line.trim();
            if (!line || line.startsWith("#") || line.startsWith("//")) {
                continue;
            }
            if (line.startsWith("[") && line.endsWith("]")) {
                currentCategory = line.slice(1, -1).trim();
                if (!rules[currentCategory]) {
                    rules[currentCategory] = [];
                }
            } else {
                if (!rules[currentCategory]) {
                    rules[currentCategory] = [];
                }
                rules[currentCategory].push(line);
            }
        }
        return rules;
    }

    function scanFileContent(fileContent, fileName) {
        const threatsFound = [];
        if (!globalRules || Object.keys(globalRules).length === 0) {
            globalRules = parseRules(fallbackRules);
        }
        for (const [category, signatures] of Object.entries(globalRules)) {
            for (const signature of signatures) {
                if (fileContent.includes(signature)) {
                    threatsFound.push({
                        file: fileName,
                        category: category,
                        matchedSignature: signature
                    });
                }
            }
        }
        return threatsFound;
    }

    async function loadRulesFromZip(zipData) {
        const parsedRules = {};
        try {
            const zip = await JSZip.loadAsync(zipData);
            const fileNames = Object.keys(zip.files);

            for (const name of fileNames) {
                const fileEntry = zip.files[name];
                if (fileEntry.dir) continue;

                const parts = name.split('/');
                const filename = parts[parts.length - 1];

                if (!filename || filename.startsWith('.') || filename.toLowerCase() === 'date.date') {
                    continue;
                }

                const content = await fileEntry.async("string");
                const dotIndex = filename.lastIndexOf('.');
                const category = dotIndex !== -1 ? filename.substring(0, dotIndex) : filename;

                const lines = content.split(/\r?\n/)
                    .map(line => line.trim())
                    .filter(line => line && !line.startsWith('#') && !line.startsWith('//'));

                if (lines.length > 0) {
                    if (!parsedRules[category]) {
                        parsedRules[category] = [];
                    }
                    parsedRules[category].push(...lines);
                }
            }
            globalRules = parsedRules;
        } catch (error) {
            globalRules = null;
        } finally {
            if (!globalRules || Object.keys(globalRules).length === 0) {
                globalRules = parseRules(fallbackRules);
                rulesLabel.textContent = "rules.zip (Используются резервные правила)";
            } else {
                rulesLabel.textContent = `rules.zip (Загружено категорий: ${Object.keys(globalRules).length})`;
            }
            targetFileInput.disabled = false;
        }
    }

    async function scanTargetZip(targetZipData, onProgress) {
        const threats = [];
        try {
            const zip = await JSZip.loadAsync(targetZipData);
            const fileNames = Object.keys(zip.files);
            const filesToScan = fileNames.filter(name => !zip.files[name].dir);
            const totalFiles = filesToScan.length;

            if (totalFiles === 0) {
                if (onProgress) onProgress(100);
                return threats;
            }

            let scannedCount = 0;
            for (const name of filesToScan) {
                const fileEntry = zip.files[name];
                const content = await fileEntry.async("string");
                const fileThreats = scanFileContent(content, name);
                
                if (fileThreats.length > 0) {
                    threats.push(...fileThreats);
                }

                scannedCount++;
                if (onProgress) {
                    const percent = Math.round((scannedCount / totalFiles) * 100);
                    onProgress(percent);
                }
            }
        } catch (error) {
            console.error(error);
        }
        return threats;
    }

    rulesFileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (file) {
            rulesLabel.textContent = "Загрузка базы...";
            const reader = new FileReader();
            reader.onload = async (event) => {
                await loadRulesFromZip(event.target.result);
            };
            reader.readAsArrayBuffer(file);
        }
    });

    targetFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            targetLabel.textContent = file.name;
            scanBtn.disabled = false;
        }
    });

    scanBtn.addEventListener('click', async () => {
        const file = targetFileInput.files[0];
        if (!file) return;

        scanBtn.disabled = true;
        progressWrapper.style.display = "block";
        resultsWrapper.style.display = "none";
        resultsWrapper.innerHTML = "";

        const reader = new FileReader();
        reader.onload = async (event) => {
            const threats = await scanTargetZip(event.target.result, (percent) => {
                progressBar.style.width = `${percent}%`;
                percentLabel.textContent = `${percent}%`;
                statusLabel.textContent = percent < 100 ? "Анализ файлов..." : "Готово!";
            });

            resultsWrapper.style.display = "block";
            if (threats.length === 0) {
                resultsWrapper.innerHTML = `
                    <div class="result-item clean">
                        <span class="badge success">Ок</span> Угроз не обнаружено. Архив чист.
                    </div>
                `;
            } else {
                threats.forEach(t => {
                    const item = document.createElement('div');
                    item.className = "result-item";
                    item.innerHTML = `
                        <span class="badge danger">${t.category}</span>
                        Файл: <strong>${t.file}</strong> <br>
                        Сработало на: <code>${t.matchedSignature}</code>
                    `;
                    resultsWrapper.appendChild(item);
                });
            }
            scanBtn.disabled = false;
        };
        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
